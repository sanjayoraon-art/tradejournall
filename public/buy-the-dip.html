<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Buy The Dip! (Bull vs Bear)</title>
    <!-- Google Fonts for High-Tech / Crypto Aesthetic -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Outfit:wght@400;600;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #07080a;
            --card-bg: rgba(13, 16, 23, 0.85);
            --card-border: rgba(255, 255, 255, 0.08);
            
            /* Neon Colors */
            --neon-cyan: #00f0ff;
            --neon-green: #00ff66;
            --neon-red: #ff0055;
            --neon-yellow: #ffb700;
            
            /* Text colors */
            --text-main: #ffffff;
            --text-sub: #7f8fa4;
            
            /* Glows */
            --glow-cyan: 0 0 15px rgba(0, 240, 255, 0.4);
            --glow-green: 0 0 15px rgba(0, 255, 102, 0.4);
            --glow-red: 0 0 15px rgba(255, 0, 85, 0.4);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(0, 240, 255, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(0, 255, 102, 0.05) 0%, transparent 40%),
                linear-gradient(to right, rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 100% 100%, 100% 100%, 30px 30px, 30px 30px;
            font-family: 'Outfit', sans-serif;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px;
            overflow-x: hidden;
        }

        /* Container & Card */
        .game-wrapper {
            width: 100%;
            max-width: 600px;
            perspective: 1000px;
        }

        .game-card {
            background: var(--card-bg);
            border: 1.5px solid var(--card-border);
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            text-align: center;
            position: relative;
            overflow: visible;
            transition: transform 0.1s ease, border-color 0.3s ease, box-shadow 0.3s ease;
        }

        /* Screen Shake effect on Crash/Loss */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-6px); }
            40%, 80% { transform: translateX(6px); }
        }

        .game-card.shaking {
            animation: shake 0.3s infinite;
            border-color: var(--neon-red);
            box-shadow: 0 0 30px rgba(255, 0, 85, 0.3);
        }

        /* Sound Controls */
        .sound-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            width: 38px;
            height: 38px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--text-sub);
            transition: all 0.2s ease;
            z-index: 10;
            touch-action: manipulation;
        }

        .sound-btn:hover {
            color: var(--text-main);
            background: rgba(255, 255, 255, 0.1);
            transform: scale(1.05);
        }

        .sound-btn:active {
            transform: scale(0.95);
        }

        /* Header Details */
        .game-header {
            margin-bottom: 20px;
        }

        .title-glow {
            display: none !important;
            font-family: 'Outfit', sans-serif;
            font-size: 2.2rem;
            font-weight: 900;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--text-main);
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
            transition: text-shadow 0.3s ease, color 0.3s ease;
            margin-bottom: 4px;
        }

        /* Dynamic Title Glows based on Game State */
        .game-card.bull-run .title-glow {
            color: var(--neon-green);
            text-shadow: 0 0 15px rgba(0, 255, 102, 0.6);
        }

        .game-card.crash-mode .title-glow {
            color: var(--neon-red);
            text-shadow: 0 0 15px rgba(255, 0, 85, 0.6);
        }

        .game-card.neutral-mode .title-glow {
            color: var(--neon-cyan);
            text-shadow: 0 0 15px rgba(0, 240, 255, 0.6);
        }

        .subtitle {
            font-size: 0.75rem;
            color: var(--text-sub);
            font-weight: 700;
            letter-spacing: 2.5px;
            text-transform: uppercase;
        }

        /* Stats Panel */
        .stats-panel {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }

        .stat-box {
            background: rgba(0, 0, 0, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 12px;
            text-align: left;
            position: relative;
        }

        .stat-label {
            font-size: 0.65rem;
            color: var(--text-sub);
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .stat-value {
            font-family: 'Orbitron', monospace;
            font-weight: 700;
            font-size: 1.4rem;
            color: var(--text-main);
        }

        .timer-glow {
            color: var(--neon-yellow);
            text-shadow: 0 0 10px rgba(255, 183, 0, 0.3);
        }

        /* Chart Visualizer Area (Replaces Vertical Progress Cylinder) */
        .chart-container {
            position: relative;
            height: min(350px, 45vh);
            width: 100%;
            margin: 20px 0;
            background: rgba(0, 0, 0, 0.45);
            border: 1.5px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.6);
        }

        .chart-grid {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
        }

        .grid-line {
            position: absolute;
            width: 100%;
            border-bottom: 1px dashed rgba(255, 255, 255, 0.04);
            height: 0;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            font-size: 0.65rem;
            font-weight: 700;
            color: var(--text-sub);
            opacity: 0.5;
        }

        .grid-line span {
            background: rgba(13, 16, 23, 0.95);
            padding: 2px 6px;
            border-radius: 4px;
            margin-left: 10px;
            font-size: 0.55rem;
            letter-spacing: 0.5px;
        }

        .grid-line.break-even-line {
            border-bottom: 1.5px dashed rgba(255, 183, 0, 0.25);
            color: var(--neon-yellow);
            opacity: 0.85;
        }

        /* Viewport where candles are rendered side-by-side */
        .candles-view {
            display: flex;
            align-items: flex-end;
            justify-content: flex-start;
            gap: 7px;
            width: 100%;
            height: 100%;
            padding: 0 16px 0 110px; /* Leave space on the left for scale labels */
            position: relative;
            z-index: 2;
            overflow-x: hidden;
        }

        /* Candlestick Layout */
        .candle {
            position: relative;
            width: 11px;
            height: 100%;
            flex-shrink: 0;
            display: flex;
            justify-content: flex-end;
            align-items: center;
        }

        .candle.green-candle {
            color: var(--neon-green);
            filter: drop-shadow(0 0 5px rgba(0, 255, 102, 0.35));
        }

        .candle.red-candle {
            color: var(--neon-red);
            filter: drop-shadow(0 0 5px rgba(255, 0, 85, 0.35));
        }

        .wick {
            position: absolute;
            width: 2px;
            background: currentColor;
            left: 50%;
            transform: translateX(-50%);
            border-radius: 1px;
            opacity: 0.6;
        }

        .body {
            position: absolute;
            width: 100%;
            background: currentColor;
            border-radius: 2px;
        }

        /* Live sweeping horizontal Price Line indicator */
        .live-price-line-container {
            position: absolute;
            width: 100%;
            left: 0;
            pointer-events: none;
            display: flex;
            align-items: center;
            z-index: 10;
            transition: bottom 0.05s linear;
        }

        .live-price-line {
            flex-grow: 1;
            border-top: 1.5px dotted currentColor;
            height: 0;
            opacity: 0.85;
        }

        .live-price-badge {
            padding: 4px 10px;
            border-radius: 8px;
            font-family: 'Orbitron', monospace;
            font-size: 0.7rem;
            font-weight: 900;
            background: rgba(7, 8, 10, 0.95);
            border: 1.5px solid currentColor;
            margin-right: 12px;
            white-space: nowrap;
            box-shadow: 0 0 10px currentColor;
            transition: color 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
        }

        /* Action Button */
        .action-button-container {
            position: relative;
            margin-top: 10px;
        }

        .action-btn {
            width: 100%;
            background: linear-gradient(135deg, #00b04c 0%, var(--neon-green) 100%);
            border: none;
            border-radius: 18px;
            padding: 18px 24px;
            font-family: 'Outfit', sans-serif;
            font-size: 1.35rem;
            font-weight: 900;
            color: #000000;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(0, 255, 102, 0.4), 0 8px 0 #008f3a;
            position: relative;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            touch-action: manipulation; /* disables double-tap to zoom on element */
            transition: transform 0.05s ease, box-shadow 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        /* Hover Pulse loop */
        @keyframes pulse-glow {
            0% { box-shadow: 0 0 10px rgba(0, 255, 102, 0.3), 0 8px 0 #008f3a; }
            50% { box-shadow: 0 0 25px rgba(0, 255, 102, 0.7), 0 8px 0 #008f3a; }
            100% { box-shadow: 0 0 10px rgba(0, 255, 102, 0.3), 0 8px 0 #008f3a; }
        }

        .action-btn.pulsing {
            animation: pulse-glow 1.5s infinite;
        }

        .action-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 25px rgba(0, 255, 102, 0.6), 0 8px 0 #008f3a;
        }

        /* Tactile click press response */
        .action-btn:active {
            transform: translateY(6px);
            box-shadow: 0 0 5px rgba(0, 255, 102, 0.2), 0 2px 0 #008f3a;
        }

        .action-btn:disabled {
            opacity: 0;
            pointer-events: none;
        }

        /* Dynamic flashing instructions */
        .instruction-banner {
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 1px;
            color: var(--neon-cyan);
            margin-top: 14px;
            text-transform: uppercase;
            height: 16px;
            animation: flash-text 1.2s infinite;
        }

        @keyframes flash-text {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        /* Result Overlay Screen */
        .result-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(6, 8, 12, 0.96);
            border-radius: 24px;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .result-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .result-badge {
            width: 76px;
            height: 76px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.2rem;
            margin-bottom: 20px;
            box-shadow: 0 0 20px currentColor;
        }

        .result-overlay.win .result-badge {
            background: rgba(0, 255, 102, 0.1);
            color: var(--neon-green);
            border: 2px solid var(--neon-green);
        }

        .result-overlay.lose .result-badge {
            background: rgba(255, 0, 85, 0.1);
            color: var(--neon-red);
            border: 2px solid var(--neon-red);
        }

        .result-title {
            font-family: 'Outfit', sans-serif;
            font-weight: 900;
            font-size: 1.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .result-overlay.win .result-title {
            color: var(--neon-green);
            text-shadow: 0 0 15px rgba(0, 255, 102, 0.4);
        }

        .result-overlay.lose .result-title {
            color: var(--neon-red);
            text-shadow: 0 0 15px rgba(255, 0, 85, 0.4);
        }

        .result-desc {
            font-size: 0.9rem;
            color: var(--text-sub);
            max-width: 280px;
            line-height: 1.5;
            margin-bottom: 24px;
        }

        .score-board {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            width: 100%;
            padding: 16px;
            margin-bottom: 24px;
            display: flex;
            justify-content: space-around;
        }

        .score-entry {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .score-lbl {
            font-size: 0.65rem;
            color: var(--text-sub);
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .score-val {
            font-family: 'Orbitron', monospace;
            font-weight: 900;
            font-size: 1.5rem;
            color: var(--text-main);
        }

        .score-val.highlight-green {
            color: var(--neon-green);
        }

        .score-val.highlight-yellow {
            color: var(--neon-yellow);
        }

        .overlay-btns {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn-overlay {
            width: 100%;
            padding: 15px;
            border-radius: 14px;
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            font-size: 1.05rem;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border: none;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            touch-action: manipulation;
        }

        .btn-whatsapp {
            background: #25D366;
            color: #ffffff;
            box-shadow: 0 4px 15px rgba(37, 211, 102, 0.25);
        }

        .btn-whatsapp:hover {
            background: #20ba59;
            box-shadow: 0 6px 20px rgba(37, 211, 102, 0.4);
            transform: translateY(-2px);
        }

        .btn-restart {
            background: transparent;
            border: 2px solid rgba(255, 255, 255, 0.15);
            color: var(--text-main);
        }

        .btn-restart:hover {
            border-color: var(--text-main);
            background: rgba(255, 255, 255, 0.05);
            transform: translateY(-2px);
        }

        .btn-restart:active, .btn-whatsapp:active {
            transform: translateY(1px);
        }

        /* SVG Icons Inline overrides */
        .icon {
            fill: currentColor;
            width: 1.2em;
            height: 1.2em;
            display: inline-block;
        }

        /* Confetti particle elements styles */
        .confetti {
            position: absolute;
            width: 8px;
            height: 8px;
            background: var(--neon-green);
            top: -10px;
            z-index: 101;
            opacity: 0.8;
            pointer-events: none;
        }

        @keyframes fall {
            0% {
                transform: translateY(0) rotate(0deg) scale(1);
                opacity: 1;
            }
            100% {
                transform: translateY(450px) rotate(720deg) scale(0.6);
                opacity: 0;
            }
        }
    </style>
</head>
<body>

    <div class="game-wrapper">
        <div class="game-card neutral-mode" id="game-card">
            
            <!-- Sound Toggle Button -->
            <button class="sound-btn" id="sound-toggle" aria-label="Toggle Sound">
                <!-- Sound ON SVG Icon (default) -->
                <svg id="sound-on-icon" class="icon" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                    <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
                    <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path>
                </svg>
                <!-- Sound OFF SVG Icon (hidden) -->
                <svg id="sound-off-icon" class="icon" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" style="display: none;">
                    <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
                    <line x1="23" y1="9" x2="17" y2="15"></line>
                    <line x1="17" y1="9" x2="23" y2="15"></line>
                </svg>
            </button>

            <!-- Game Header -->
            <div class="game-header">
                <h1 class="title-glow" id="header-title">BUY THE DIP</h1>
                <div class="subtitle">Bull vs Bear</div>
            </div>

            <!-- Stats Bar -->
            <div class="stats-panel">
                <div class="stat-box">
                    <div class="stat-label">Time Remaining</div>
                    <div class="stat-value timer-glow" id="timer-label">10.0s</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">Clicks (Score)</div>
                    <div class="stat-value" id="score-label">0</div>
                </div>
            </div>

            <!-- Central visual candlestick chart -->
            <div class="chart-container" id="chart-container">
                <!-- Background Grid scale -->
                <div class="chart-grid">
                    <div class="grid-line" style="bottom: 90%;"><span>90% - BULL RUN 🚀</span></div>
                    <div class="grid-line" style="bottom: 70%;"><span>70%</span></div>
                    <div class="grid-line break-even-line" style="bottom: 50%;"><span>50% - BREAK EVEN ⚖️</span></div>
                    <div class="grid-line" style="bottom: 30%;"><span>30%</span></div>
                    <div class="grid-line" style="bottom: 10%;"><span>10% - CRASH 📉</span></div>
                </div>

                <!-- Viewport containing the candles list -->
                <div class="candles-view" id="candles-view">
                    <!-- Loaded dynamically via JS -->
                </div>

                <!-- Real-time horizontal sweeping price line and label -->
                <div class="live-price-line-container" id="live-price-line-container">
                    <div class="live-price-line"></div>
                    <div class="live-price-badge" id="live-price-badge">$50,000</div>
                </div>
            </div>

            <!-- Interaction Button -->
            <div class="action-button-container">
                <button class="action-btn pulsing" id="buy-btn">
                    BUY THE DIP 📈
                </button>
            </div>

            <!-- Instruction Text -->
            <div class="instruction-banner" id="instruction-label">
                Click Button to Start Battle
            </div>

            <!-- Fullscreen Result Overlay -->
            <div class="result-overlay" id="result-overlay">
                <div class="result-badge" id="result-badge">🏆</div>
                <h2 class="result-title" id="result-title">Victory!</h2>
                <p class="result-desc" id="result-desc">Bull Run secured! You saved the dip.</p>
                
                <div class="score-board">
                    <div class="score-entry">
                        <div class="score-lbl">Your Score</div>
                        <div class="score-val highlight-green" id="final-score">72</div>
                    </div>
                    <div class="score-entry">
                        <div class="score-lbl">End Price</div>
                        <div class="score-val highlight-yellow" id="final-price">$58,200</div>
                    </div>
                </div>

                <div class="overlay-btns">
                    <!-- WhatsApp Share Link -->
                    <button class="btn-overlay btn-whatsapp" id="share-btn">
                        <!-- WhatsApp Logo SVG -->
                        <svg class="icon" viewBox="0 0 448 512" style="fill: white;">
                            <path d="M380.9 97.1C339 55.1 283.2 32 223.9 32c-122.4 0-222 99.6-222 222 0 39.1 10.2 77.3 29.6 111L0 480l117.7-30.9c32.4 17.7 68.9 27 106.1 27h.1c122.3 0 224.1-99.6 224.1-222 0-59.3-25.2-115-67.1-157zm-157 341.6c-33.2 0-65.7-8.9-94-25.7l-6.7-4-69.8 18.3L72 359.2l-4.4-7c-18.5-29.4-28.2-63.3-28.2-98.2 0-101.7 82.8-184.5 184.6-184.5 49.3 0 95.6 19.2 130.4 54.1 34.8 34.9 56.2 81.2 56.1 130.5 0 101.8-84.9 184.6-186.6 184.6zm101.2-138.2c-5.5-2.8-32.8-16.2-37.9-18-5.1-1.9-8.8-2.8-12.5 2.8-3.7 5.6-14.3 18-17.6 21.8-3.2 3.7-6.5 4.2-12 1.4-32.6-16.3-54-29.1-75.5-66-5.7-9.8 5.7-9.1 16.3-30.3 1.8-3.7.9-6.9-.5-9.7-1.4-2.8-12.5-30.1-17.1-41.2-4.5-10.8-9.1-9.3-12.5-9.5-3.2-.2-6.9-.2-10.6-.2-3.7 0-9.7 1.4-14.8 6.9-5.1 5.6-19.4 19-19.4 46.3 0 27.3 19.9 53.7 22.6 57.4 2.8 3.7 39.1 59.7 94.8 83.8 35.2 15.2 49 16.5 66.6 13.9 10.7-1.6 32.8-13.4 37.4-26.4 4.6-13 4.6-24.1 3.2-26.4-1.3-2.5-5-3.9-10.5-6.6z"/>
                        </svg>
                        Share to WhatsApp
                    </button>
                    <!-- Restart Game -->
                    <button class="btn-overlay btn-restart" id="restart-btn">
                        Play Again
                    </button>
                </div>
            </div>

        </div>
    </div>

    <script>
        // Custom Audio File URL Map (configured by user)
        const SOUNDS = {
            click: 'click-sound.mp3',
            win: 'win-sound.mp3',
            lose: 'lose-sound.mp3'
        };

        // Pre-game historical crash data structure to show the "dip" before start
        const HISTORICAL_CANDLES = [
            { open: 72, high: 75, low: 69, close: 74 },
            { open: 74, high: 78, low: 72, close: 76 },
            { open: 76, high: 77, low: 67, close: 69 },
            { open: 69, high: 71, low: 63, close: 64 },
            { open: 64, high: 70, low: 62, close: 68 },
            { open: 68, high: 72, low: 66, close: 70 },
            { open: 70, high: 71, low: 58, close: 60 },
            { open: 60, high: 63, low: 55, close: 57 },
            { open: 57, high: 59, low: 50, close: 52 },
            { open: 52, high: 56, low: 51, close: 55 },
            { open: 55, high: 57, low: 47, close: 49 },
            { open: 49, high: 51, low: 44, close: 46 },
            { open: 46, high: 50, low: 45, close: 48 },
            { open: 48, high: 50, low: 43, close: 45 },
            { open: 45, high: 51, low: 44, close: 50 }
        ];

        // Game Configuration & Math Tuning
        const GAME_DURATION = 10000;      // 10.0 seconds in milliseconds
        const TICK_INTERVAL = 50;         // Game loop ticks every 50ms
        const CANDLE_PERIOD = 500;        // Open a new candle every 500ms
        const TICKS_PER_CANDLE = CANDLE_PERIOD / TICK_INTERVAL; // 10 ticks per candle
        
        const USER_CLICK_INCREASE = 2.0;  // Click increases progress by 2.0%
        const AI_DRAIN_PER_TICK = 0.6;    // AI drains 0.6% per 50ms (= 1.2% per 100ms)
        // Break-even threshold: 6 clicks per second.
        // Clicking > 6/s pumps the price up. Clicking < 6/s drops the price.

        // Game State Variables
        let state = 'ready'; // 'ready', 'playing', 'ended'
        let startTime = 0;
        let elapsed = 0;
        let score = 0;
        let marketPricePercent = 50.0; // Starts at 50%
        let isMuted = false;
        
        // Rolling Candlestick List
        let candles = [];
        let currentCandle = null;

        // Loop / Audio Refs
        let gameLoopTimer = null;
        let audioCtx = null;
        let tickCounter = 0;

        // DOM elements cache
        const gameCard = document.getElementById('game-card');
        const headerTitle = document.getElementById('header-title');
        const timerLabel = document.getElementById('timer-label');
        const scoreLabel = document.getElementById('score-label');
        const candlesView = document.getElementById('candles-view');
        const livePriceLineContainer = document.getElementById('live-price-line-container');
        const livePriceBadge = document.getElementById('live-price-badge');
        const buyBtn = document.getElementById('buy-btn');
        const instructionLabel = document.getElementById('instruction-label');
        const soundToggle = document.getElementById('sound-toggle');
        const soundOnIcon = document.getElementById('sound-on-icon');
        const soundOffIcon = document.getElementById('sound-off-icon');

        // Result screen DOM
        const resultOverlay = document.getElementById('result-overlay');
        const resultBadge = document.getElementById('result-badge');
        const resultTitle = document.getElementById('result-title');
        const resultDesc = document.getElementById('result-desc');
        const finalScore = document.getElementById('final-score');
        const finalPrice = document.getElementById('final-price');
        const shareBtn = document.getElementById('share-btn');
        const restartBtn = document.getElementById('restart-btn');

        /* ===================================================================
           SOUND ENGINE (Web Audio API Synthesizer with Custom File Fallback)
           =================================================================== */

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        // Web Audio Synthesizer (Instant, retro 8-bit sound effects)
        function playSynthesizedSound(type) {
            initAudio();
            if (!audioCtx || isMuted) return;

            const now = audioCtx.currentTime;

            if (type === 'click') {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(800, now);
                osc.frequency.exponentialRampToValueAtTime(1200, now + 0.08);
                
                gain.gain.setValueAtTime(0.12, now);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
                
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                
                osc.start(now);
                osc.stop(now + 0.08);
            } 
            else if (type === 'win') {
                const scale = [523.25, 659.25, 783.99, 1046.50]; // C5 -> E5 -> G5 -> C6
                scale.forEach((freq, index) => {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(freq, now + index * 0.07);
                    
                    gain.gain.setValueAtTime(0, now + index * 0.07);
                    gain.gain.linearRampToValueAtTime(0.1, now + index * 0.07 + 0.02);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + index * 0.07 + 0.18);
                    
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    
                    osc.start(now + index * 0.07);
                    osc.stop(now + index * 0.07 + 0.22);
                });
            } 
            else if (type === 'lose') {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                const filter = audioCtx.createBiquadFilter();
                
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(240, now);
                osc.frequency.exponentialRampToValueAtTime(60, now + 0.65);
                
                filter.type = 'lowpass';
                filter.frequency.setValueAtTime(320, now);
                filter.frequency.exponentialRampToValueAtTime(100, now + 0.65);
                
                gain.gain.setValueAtTime(0.18, now);
                gain.gain.linearRampToValueAtTime(0.12, now + 0.15);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 0.65);
                
                osc.connect(filter);
                filter.connect(gain);
                gain.connect(audioCtx.destination);
                
                osc.start(now);
                osc.stop(now + 0.65);
            }
        }

        // Custom MP3 Audio File Loader
        function playAudioFile(url) {
            try {
                const audio = new Audio(url);
                audio.volume = 0.45;
                audio.play().catch(e => {
                    console.log("Audio file loading blocked or failed. Using synth fallback.");
                });
            } catch (err) {
                console.warn(err);
            }
        }

        // Master Sound Dispatcher
        function playSound(type) {
            if (isMuted) return;

            const url = SOUNDS[type];
            const isPlaceholder = !url || url === `${type}-sound.mp3`;

            if (isPlaceholder) {
                playSynthesizedSound(type);
            } else {
                playAudioFile(url);
            }
        }

        // Toggle Sound Mute
        soundToggle.addEventListener('click', () => {
            isMuted = !isMuted;
            initAudio();
            if (isMuted) {
                soundOnIcon.style.display = 'none';
                soundOffIcon.style.display = 'block';
            } else {
                soundOnIcon.style.display = 'block';
                soundOffIcon.style.display = 'none';
                playSynthesizedSound('click');
            }
        });

        /* ===================================================================
           CANDLESTICK CHART RENDER ENGINE
           =================================================================== */

        // Redraws all displayed candlesticks inside the viewport
        function renderChart() {
            // Combine historical/completed candles and active game candle
            const combinedList = [...candles];
            if (currentCandle) {
                combinedList.push(currentCandle);
            }

            // Slice list to display last 100 candles to fit screen nicely and allow scrolling
            const maxVisible = 100;
            const startIdx = Math.max(0, combinedList.length - maxVisible);
            const visibleList = combinedList.slice(startIdx);

            let htmlString = '';
            visibleList.forEach(c => {
                const isGreen = c.close >= c.open;
                const bodyBottom = Math.min(c.open, c.close);
                const bodyHeight = Math.max(1.5, Math.abs(c.open - c.close)); // Minimum height for line
                const wickBottom = c.low;
                const wickHeight = Math.max(1.5, c.high - c.low);

                const colorStyle = isGreen ? 'var(--neon-green)' : 'var(--neon-red)';
                const colorClass = isGreen ? 'green-candle' : 'red-candle';

                htmlString += `
                    <div class="candle ${colorClass}" style="color: ${colorStyle};">
                        <div class="wick" style="bottom: ${wickBottom}%; height: ${wickHeight}%;"></div>
                        <div class="body" style="bottom: ${bodyBottom}%; height: ${bodyHeight}%;"></div>
                    </div>
                `;
            });

            candlesView.innerHTML = htmlString;
            candlesView.scrollLeft = candlesView.scrollWidth;
        }

        // Update UI dynamic colors, line positioning, price label
        function updateUI() {
            marketPricePercent = Math.max(0, Math.min(100, marketPricePercent));

            // Synchronize Live Price indicator height percentage
            livePriceLineContainer.style.bottom = `${marketPricePercent}%`;

            // Calculate simulated price label ($0 to $100,000)
            const simulatedPrice = Math.round(marketPricePercent * 1000);
            livePriceBadge.innerText = `$${simulatedPrice.toLocaleString()}`;

            // Sync color themes based on market level
            let activeColor = 'var(--neon-cyan)';
            gameCard.classList.remove('bull-run', 'crash-mode', 'neutral-mode');
            
            if (marketPricePercent > 60) {
                gameCard.classList.add('bull-run');
                headerTitle.innerText = "BULL RUN 📈";
                activeColor = 'var(--neon-green)';
            } else if (marketPricePercent < 40) {
                gameCard.classList.add('crash-mode');
                headerTitle.innerText = "CRASHING! 📉";
                activeColor = 'var(--neon-red)';
            } else {
                gameCard.classList.add('neutral-mode');
                headerTitle.innerText = "BUY THE DIP";
            }

            livePriceLineContainer.style.color = activeColor;
            renderChart();
        }

        // Pre-populates the grid with historical crash data on load
        function loadHistoricalData() {
            candles = [...HISTORICAL_CANDLES];
            currentCandle = null;
            marketPricePercent = 50.0; // Ends at 50%
            updateUI();
        }

        /* ===================================================================
           CORE GAMEPLAY LOOPS
           =================================================================== */

        function startGame() {
            if (window.innerWidth < 768) {
                const docElm = document.documentElement;
                if (docElm.requestFullscreen) docElm.requestFullscreen().catch(() => {});
                else if (docElm.webkitRequestFullscreen) docElm.webkitRequestFullscreen().catch(() => {});
            }

            state = 'playing';
            startTime = Date.now();
            score = 0;
            marketPricePercent = 50.0;
            elapsed = 0;
            tickCounter = 0;
            
            // Clear historical records to show only the active game path
            candles = [];
            
            // Open the first live candlestick
            currentCandle = {
                open: marketPricePercent,
                close: marketPricePercent,
                high: marketPricePercent,
                low: marketPricePercent
            };

            buyBtn.classList.remove('pulsing');
            instructionLabel.innerText = "TAP RAPIDLY TO PUMP!";

            // Game main interval loop
            gameLoopTimer = setInterval(() => {
                const now = Date.now();
                elapsed = now - startTime;
                const timeRemaining = Math.max(0, GAME_DURATION - elapsed);

                // Update digital countdown display
                timerLabel.innerText = `${(timeRemaining / 1000).toFixed(1)}s`;

                // Bear Market Drain action
                marketPricePercent -= AI_DRAIN_PER_TICK;

                // Update current candle wicks and body close
                if (currentCandle) {
                    currentCandle.close = marketPricePercent;
                    currentCandle.high = Math.max(currentCandle.high, marketPricePercent);
                    currentCandle.low = Math.min(currentCandle.low, marketPricePercent);
                }

                tickCounter++;
                
                // Close current candle and open a new one every 500ms (10 ticks)
                if (tickCounter % TICKS_PER_CANDLE === 0 && timeRemaining > 0) {
                    candles.push(currentCandle);
                    currentCandle = {
                        open: marketPricePercent,
                        close: marketPricePercent,
                        high: marketPricePercent,
                        low: marketPricePercent
                    };
                }

                updateUI();

                // Trigger card shakes on severe price drops (< 20%)
                if (marketPricePercent < 20) {
                    gameCard.classList.add('shaking');
                } else {
                    gameCard.classList.remove('shaking');
                }

                // Check game finish state
                if (timeRemaining <= 0) {
                    endGame();
                }
            }, TICK_INTERVAL);
        }

        function buyTheDip() {
            initAudio();

            if (state === 'ended') return;

            if (state === 'ready') {
                startGame();
            }

            score++;
            scoreLabel.innerText = score;

            // Pump the market price up!
            marketPricePercent += USER_CLICK_INCREASE;

            // Instantly update current candle metrics
            if (currentCandle) {
                currentCandle.close = marketPricePercent;
                currentCandle.high = Math.max(currentCandle.high, marketPricePercent);
            }

            updateUI();
            playSound('click');

            // Tactile click scale shrink
            buyBtn.style.transform = 'scale(0.96) translateY(4px)';
            setTimeout(() => {
                if (state !== 'ended') {
                    buyBtn.style.transform = '';
                }
            }, 60);
        }

        function endGame() {
            clearInterval(gameLoopTimer);
            state = 'ended';

            // Close the final active candle into history
            if (currentCandle) {
                candles.push(currentCandle);
                currentCandle = null;
            }
            updateUI();

            gameCard.classList.remove('shaking');
            buyBtn.style.transform = '';
            buyBtn.style.display = 'none';
            instructionLabel.style.display = 'none';

            const isWin = marketPricePercent >= 50.0;
            const finalFormattedPrice = `$${Math.round(marketPricePercent * 1000).toLocaleString()}`;
            
            resultOverlay.className = `result-overlay active ${isWin ? 'win' : 'lose'}`;

            if (isWin) {
                resultBadge.innerText = "🚀";
                resultTitle.innerText = "BULL RUN SECURED!";
                resultDesc.innerText = `You successfully squeezed the bears and saved the market! 💎🙌`;
                playSound('win');
                triggerConfetti();
            } else {
                resultBadge.innerText = "🐻";
                resultTitle.innerText = "REKT BY THE BEAR!";
                resultDesc.innerText = `Liquidation triggered! The bear market crashed the price below break-even. 🐻💸`;
                playSound('lose');
            }

            finalScore.innerText = score;
            finalPrice.innerText = finalFormattedPrice;

            // WhatsApp Share
            const shareText = `I scored ${score} clicks in 10 seconds and survived the crypto crash! Can you beat my score? Play here: https://tradejournall.com/game`;
            shareBtn.onclick = () => {
                window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(shareText)}`, '_blank');
            };
        }

        function resetGame() {
            state = 'ready';
            score = 0;
            elapsed = 0;
            tickCounter = 0;

            timerLabel.innerText = "10.0s";
            scoreLabel.innerText = "0";
            headerTitle.innerText = "BUY THE DIP";
            instructionLabel.innerText = "Click Button to Start Battle";

            gameCard.classList.remove('bull-run', 'crash-mode', 'neutral-mode', 'shaking');
            resultOverlay.className = "result-overlay"; // Hide modal

            buyBtn.style.display = 'flex';
            buyBtn.style.transform = '';
            buyBtn.classList.add('pulsing');
            instructionLabel.style.display = 'block';

            loadHistoricalData();
        }

        // Add accessible snappy tap/click event listeners
        buyBtn.addEventListener('click', () => {
            buyTheDip();
        });

        restartBtn.addEventListener('click', () => {
            playSound('click');
            resetGame();
        });

        // Initialize historical data on page load
        loadHistoricalData();

        /* ===================================================================
           CELEBRATION CONFETTI ENGINE (Zero-dependency canvas fallback)
           =================================================================== */
        function triggerConfetti() {
            const colors = ['#00ff66', '#00f0ff', '#ffffff', '#ffb700'];
            const container = document.getElementById('result-overlay');
            
            for (let i = 0; i < 40; i++) {
                const particle = document.createElement('div');
                particle.className = 'confetti';
                
                const randomColor = colors[Math.floor(Math.random() * colors.length)];
                particle.style.background = randomColor;
                particle.style.left = `${Math.random() * 90 + 5}%`;
                particle.style.width = `${Math.random() * 6 + 6}px`;
                particle.style.height = `${Math.random() * 6 + 6}px`;
                particle.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
                
                const delay = Math.random() * 0.5;
                const duration = Math.random() * 1.5 + 1.2;
                particle.style.animation = `fall ${duration}s linear ${delay}s forwards`;
                
                container.appendChild(particle);
                
                setTimeout(() => {
                    particle.remove();
                }, (delay + duration) * 1000);
            }
        }
    </script>
